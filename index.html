<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>心灵伙伴 - 身心健康虚拟宠物</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- 创建页面 -->
    <div id="create-page" class="page active">
        <div class="create-container">
            <div class="create-header">
                <div class="logo">🧡</div>
                <h1>心灵伙伴</h1>
                <p>在这里遇见你的专属陪伴</p>
            </div>

            <!-- 步骤指示器 -->
            <div class="step-indicator">
                <div class="step active" data-step="1">
                    <span class="step-num">1</span>
                    <span class="step-label">选择形象</span>
                </div>
                <div class="step-line"></div>
                <div class="step" data-step="2">
                    <span class="step-num">2</span>
                    <span class="step-label">选择颜色</span>
                </div>
                <div class="step-line"></div>
                <div class="step" data-step="3">
                    <span class="step-num">3</span>
                    <span class="step-label">取个名字</span>
                </div>
            </div>

            <!-- 步骤1：选择宠物类型 -->
            <div class="create-step active" data-step="1">
                <h2>选择你的心灵伙伴</h2>
                <div class="pet-grid">
                    <div class="pet-option selected" data-type="bunny">
                        <div class="pet-preview bunny-preview">
                            <svg viewBox="0 0 100 120" class="pet-svg">
                                <!-- 兔子身体 -->
                                <ellipse cx="50" cy="85" rx="30" ry="25" fill="#FFE4E8"/>
                                <!-- 兔子耳朵 -->
                                <ellipse cx="35" cy="25" rx="8" ry="25" fill="#FFE4E8" class="ear-left"/>
                                <ellipse cx="65" cy="25" rx="8" ry="25" fill="#FFE4E8" class="ear-right"/>
                                <ellipse cx="35" cy="25" rx="4" ry="18" fill="#FFB6C1" class="ear-inner"/>
                                <ellipse cx="65" cy="25" rx="4" ry="18" fill="#FFB6C1" class="ear-inner"/>
                                <!-- 兔子头 -->
                                <circle cx="50" cy="55" r="25" fill="#FFE4E8"/>
                                <!-- 腮红 -->
                                <ellipse cx="30" cy="60" rx="6" ry="4" fill="#FFB6C1" opacity="0.6"/>
                                <ellipse cx="70" cy="60" rx="6" ry="4" fill="#FFB6C1" opacity="0.6"/>
                                <!-- 眼睛 -->
                                <ellipse cx="40" cy="52" rx="6" ry="7" fill="#333"/>
                                <ellipse cx="60" cy="52" rx="6" ry="7" fill="#333"/>
                                <circle cx="42" cy="50" r="2" fill="#fff"/>
                                <circle cx="62" cy="50" r="2" fill="#fff"/>
                                <!-- 鼻子 -->
                                <ellipse cx="50" cy="62" rx="3" ry="2" fill="#FFB6C1"/>
                                <!-- 嘴巴 -->
                                <path d="M47 66 Q50 70 53 66" stroke="#333" stroke-width="1.5" fill="none"/>
                                <!-- 前脚 -->
                                <ellipse cx="38" cy="105" rx="8" ry="5" fill="#FFE4E8"/>
                                <ellipse cx="62" cy="105" rx="8" ry="5" fill="#FFE4E8"/>
                            </svg>
                        </div>
                        <span>小兔子</span>
                    </div>

                    <div class="pet-option" data-type="cat">
                        <div class="pet-preview cat-preview">
                            <svg viewBox="0 0 100 110" class="pet-svg">
                                <!-- 猫身体 -->
                                <ellipse cx="50" cy="85" rx="28" ry="20" fill="#C4A574"/>
                                <!-- 猫头 -->
                                <circle cx="50" cy="50" r="28" fill="#C4A574"/>
                                <!-- 猫耳朵 -->
                                <polygon points="25,35 35,10 45,35" fill="#C4A574"/>
                                <polygon points="75,35 65,10 55,35" fill="#C4A574"/>
                                <polygon points="28,33 35,15 42,33" fill="#FFB6C1"/>
                                <polygon points="72,33 65,15 58,33" fill="#FFB6C1"/>
                                <!-- 脸部白色 -->
                                <ellipse cx="50" cy="58" rx="15" ry="12" fill="#FFF8E7"/>
                                <!-- 腮红 -->
                                <ellipse cx="32" cy="55" rx="5" ry="3" fill="#FFB6C1" opacity="0.5"/>
                                <ellipse cx="68" cy="55" rx="5" ry="3" fill="#FFB6C1" opacity="0.5"/>
                                <!-- 眼睛 -->
                                <ellipse cx="40" cy="48" rx="7" ry="8" fill="#4A7C59"/>
                                <ellipse cx="60" cy="48" rx="7" ry="8" fill="#4A7C59"/>
                                <ellipse cx="40" cy="48" rx="3" ry="6" fill="#333"/>
                                <ellipse cx="60" cy="48" rx="3" ry="6" fill="#333"/>
                                <circle cx="42" cy="46" r="2" fill="#fff"/>
                                <circle cx="62" cy="46" r="2" fill="#fff"/>
                                <!-- 胡须 -->
                                <line x1="20" y1="55" x2="35" y2="58" stroke="#8B7355" stroke-width="1"/>
                                <line x1="20" y1="60" x2="35" y2="60" stroke="#8B7355" stroke-width="1"/>
                                <line x1="80" y1="55" x2="65" y2="58" stroke="#8B7355" stroke-width="1"/>
                                <line x1="80" y1="60" x2="65" y2="60" stroke="#8B7355" stroke-width="1"/>
                                <!-- 鼻子 -->
                                <polygon points="50,58 47,62 53,62" fill="#FFB6C1"/>
                                <!-- 嘴巴 -->
                                <path d="M47 64 L50 67 L53 64" stroke="#333" stroke-width="1.5" fill="none"/>
                                <!-- 尾巴 -->
                                <path d="M78 85 Q95 70 85 55" stroke="#C4A574" stroke-width="8" fill="none" stroke-linecap="round"/>
                            </svg>
                        </div>
                        <span>小猫咪</span>
                    </div>

                    <div class="pet-option" data-type="bear">
                        <div class="pet-preview bear-preview">
                            <svg viewBox="0 0 100 110" class="pet-svg">
                                <!-- 熊身体 -->
                                <ellipse cx="50" cy="88" rx="32" ry="22" fill="#8B6914"/>
                                <!-- 肚子 -->
                                <ellipse cx="50" cy="90" rx="20" ry="14" fill="#D4A84B"/>
                                <!-- 熊头 -->
                                <circle cx="50" cy="48" r="30" fill="#8B6914"/>
                                <!-- 熊耳朵 -->
                                <circle cx="25" cy="25" r="12" fill="#8B6914"/>
                                <circle cx="75" cy="25" r="12" fill="#8B6914"/>
                                <circle cx="25" cy="25" r="7" fill="#D4A84B"/>
                                <circle cx="75" cy="25" r="7" fill="#D4A84B"/>
                                <!-- 脸部 -->
                                <ellipse cx="50" cy="55" rx="18" ry="15" fill="#D4A84B"/>
                                <!-- 腮红 -->
                                <ellipse cx="30" cy="52" rx="6" ry="4" fill="#FFB6C1" opacity="0.4"/>
                                <ellipse cx="70" cy="52" rx="6" ry="4" fill="#FFB6C1" opacity="0.4"/>
                                <!-- 眼睛 -->
                                <circle cx="38" cy="45" r="6" fill="#333"/>
                                <circle cx="62" cy="45" r="6" fill="#333"/>
                                <circle cx="40" cy="43" r="2" fill="#fff"/>
                                <circle cx="64" cy="43" r="2" fill="#fff"/>
                                <!-- 鼻子 -->
                                <ellipse cx="50" cy="55" rx="6" ry="4" fill="#333"/>
                                <ellipse cx="50" cy="54" rx="2" ry="1" fill="#666"/>
                                <!-- 嘴巴 -->
                                <path d="M44 62 Q50 68 56 62" stroke="#333" stroke-width="2" fill="none"/>
                                <!-- 前脚 -->
                                <ellipse cx="35" cy="105" rx="10" ry="6" fill="#8B6914"/>
                                <ellipse cx="65" cy="105" rx="10" ry="6" fill="#8B6914"/>
                            </svg>
                        </div>
                        <span>小熊</span>
                    </div>

                    <div class="pet-option" data-type="fox">
                        <div class="pet-preview fox-preview">
                            <svg viewBox="0 0 100 115" class="pet-svg">
                                <!-- 狐狸身体 -->
                                <ellipse cx="50" cy="90" rx="25" ry="18" fill="#E07B39"/>
                                <!-- 肚子 -->
                                <ellipse cx="50" cy="92" rx="15" ry="12" fill="#FFF8E7"/>
                                <!-- 尾巴 -->
                                <ellipse cx="80" cy="80" rx="18" ry="10" fill="#E07B39" transform="rotate(-20 80 80)"/>
                                <ellipse cx="92" cy="75" rx="8" ry="5" fill="#FFF8E7" transform="rotate(-20 92 75)"/>
                                <!-- 狐狸头 -->
                                <ellipse cx="50" cy="50" r="26" fill="#E07B39"/>
                                <!-- 脸部白色 -->
                                <ellipse cx="50" cy="58" rx="16" ry="14" fill="#FFF8E7"/>
                                <!-- 狐狸耳朵 -->
                                <polygon points="28,40 38,8 48,40" fill="#E07B39"/>
                                <polygon points="72,40 62,8 52,40" fill="#E07B39"/>
                                <polygon points="31,38 38,15 45,38" fill="#FFE4D4"/>
                                <polygon points="69,38 62,15 55,38" fill="#FFE4D4"/>
                                <!-- 腮红 -->
                                <ellipse cx="30" cy="55" rx="5" ry="3" fill="#FFB6C1" opacity="0.5"/>
                                <ellipse cx="70" cy="55" rx="5" ry="3" fill="#FFB6C1" opacity="0.5"/>
                                <!-- 眼睛 -->
                                <ellipse cx="40" cy="48" rx="5" ry="6" fill="#333"/>
                                <ellipse cx="60" cy="48" rx="5" ry="6" fill="#333"/>
                                <circle cx="42" cy="46" r="2" fill="#fff"/>
                                <circle cx="62" cy="46" r="2" fill="#fff"/>
                                <!-- 鼻子 -->
                                <ellipse cx="50" cy="58" rx="4" ry="3" fill="#333"/>
                                <!-- 嘴巴 -->
                                <path d="M46 63 Q50 67 54 63" stroke="#333" stroke-width="1.5" fill="none"/>
                                <!-- 前脚 -->
                                <ellipse cx="40" cy="105" rx="7" ry="5" fill="#E07B39"/>
                                <ellipse cx="60" cy="105" rx="7" ry="5" fill="#E07B39"/>
                            </svg>
                        </div>
                        <span>小狐狸</span>
                    </div>
                </div>
                <button class="next-btn" data-next="2">下一步 →</button>
            </div>

            <!-- 步骤2：选择颜色 -->
            <div class="create-step" data-step="2">
                <h2>选择喜欢的颜色</h2>
                <div class="color-grid">
                    <div class="color-option selected" data-color="#FFB6C1">
                        <div class="color-swatch" style="background: #FFB6C1"></div>
                        <span>樱花粉</span>
                    </div>
                    <div class="color-option" data-color="#87CEEB">
                        <div class="color-swatch" style="background: #87CEEB"></div>
                        <span>天空蓝</span>
                    </div>
                    <div class="color-option" data-color="#98FB98">
                        <div class="color-swatch" style="background: #98FB98"></div>
                        <span>薄荷绿</span>
                    </div>
                    <div class="color-option" data-color="#DDA0DD">
                        <div class="color-swatch" style="background: #DDA0DD"></div>
                        <span>葡萄紫</span>
                    </div>
                    <div class="color-option" data-color="#F0E68C">
                        <div class="color-swatch" style="background: #F0E68C"></div>
                        <span>柠檬黄</span>
                    </div>
                    <div class="color-option" data-color="#FFA07A">
                        <div class="color-swatch" style="background: #FFA07A"></div>
                        <span>蜜桃橙</span>
                    </div>
                </div>
                <div class="step-buttons">
                    <button class="prev-btn" data-prev="1">← 上一步</button>
                    <button class="next-btn" data-next="3">下一步 →</button>
                </div>
            </div>

            <!-- 步骤3：输入名字 -->
            <div class="create-step" data-step="3">
                <h2>给你的伙伴取个名字</h2>
                <div class="name-preview">
                    <div class="pet-avatar" id="name-pet-avatar">
                        <svg viewBox="0 0 100 120" class="pet-svg"></svg>
                    </div>
                </div>
                <div class="name-input-wrapper">
                    <input type="text" id="pet-name" placeholder="输入名字..." maxlength="8">
                    <div class="name-hint">名字会在对话中显示哦</div>
                </div>
                <div class="step-buttons">
                    <button class="prev-btn" data-prev="2">← 上一步</button>
                    <button class="start-btn" id="start-btn">开始陪伴之旅 🧡</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 主页面 -->
    <div id="main-page" class="page">
        <!-- 侧边栏 -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="pet-avatar-small" id="sidebar-pet-avatar"></div>
                <div class="pet-info">
                    <span class="pet-name" id="sidebar-pet-name">小伙伴</span>
                    <span class="pet-status" id="pet-status">陪伴中</span>
                </div>
            </div>

            <div class="stats-section">
                <h3>身心状态</h3>
                <div class="stat-item">
                    <div class="stat-label">
                        <span>💖 心情值</span>
                        <span class="stat-value" id="mood-value">75</span>
                    </div>
                    <div class="stat-bar">
                        <div class="stat-fill mood-fill" id="mood-fill" style="width: 75%"></div>
                    </div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">
                        <span>💪 健康值</span>
                        <span class="stat-value" id="health-value">80</span>
                    </div>
                    <div class="stat-bar">
                        <div class="stat-fill health-fill" id="health-fill" style="width: 80%"></div>
                    </div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">
                        <span>⚡ 能量值</span>
                        <span class="stat-value" id="energy-value">70</span>
                    </div>
                    <div class="stat-bar">
                        <div class="stat-fill energy-fill" id="energy-fill" style="width: 70%"></div>
                    </div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">
                        <span>🌟 信心值</span>
                        <span class="stat-value" id="confidence-value">65</span>
                    </div>
                    <div class="stat-bar">
                        <div class="stat-fill confidence-fill" id="confidence-fill" style="width: 65%"></div>
                    </div>
                </div>
            </div>

            <div class="advice-section">
                <h3>💡 调节建议</h3>
                <div class="advice-content" id="advice-content">
                    <p>今天也要好好照顾自己哦～</p>
                </div>
            </div>

            <div class="actions-section">
                <button class="action-btn" id="change-appearance-btn">👗 换装</button>
                <button class="action-btn" id="reset-btn">🔄 重置</button>
            </div>
        </aside>

        <!-- 主内容区 -->
        <main class="main-content">
            <div class="chat-container">
                <div class="chat-header">
                    <h2>💬 和伙伴聊聊</h2>
                    <p>分享你的心情，我会一直在这里倾听</p>
                </div>

                <!-- 心情选择 -->
                <div class="mood-selector">
                    <h3>现在的心情是？</h3>
                    <div class="mood-options">
                        <button class="mood-btn" data-mood="happy" data-label="开心">
                            <span class="mood-emoji">😊</span>
                            <span>开心</span>
                        </button>
                        <button class="mood-btn" data-mood="calm" data-label="平静">
                            <span class="mood-emoji">😌</span>
                            <span>平静</span>
                        </button>
                        <button class="mood-btn" data-mood="worried" data-label="担心">
                            <span class="mood-emoji">😟</span>
                            <span>担心</span>
                        </button>
                        <button class="mood-btn" data-mood="sad" data-label="难过">
                            <span class="mood-emoji">😢</span>
                            <span>难过</span>
                        </button>
                        <button class="mood-btn" data-mood="angry" data-label="生气">
                            <span class="mood-emoji">😠</span>
                            <span>生气</span>
                        </button>
                    </div>
                </div>

                <!-- 倾诉输入 -->
                <div class="vent-input-section">
                    <h3>想说什么都可以～</h3>
                    <textarea id="vent-input" placeholder="今天发生了什么事？有什么想倾诉的？" rows="4"></textarea>
                    <button class="vent-submit-btn" id="vent-submit">
                        <span>倾诉</span>
                        <span class="btn-icon">💭</span>
                    </button>
                </div>

                <!-- 历史记录 -->
                <div class="history-section">
                    <h3>📝 心路历程</h3>
                    <div class="history-list" id="history-list">
                        <div class="history-empty">还没有记录，从倾诉开始吧～</div>
                    </div>
                </div>
            </div>
        </main>

        <!-- 换装弹窗 -->
        <div class="modal" id="appearance-modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h3>👗 换装</h3>
                    <button class="modal-close" id="modal-close">×</button>
                </div>
                <div class="modal-body">
                    <div class="appearance-section">
                        <h4>形象</h4>
                        <div class="pet-type-grid" id="change-pet-types"></div>
                    </div>
                    <div class="appearance-section">
                        <h4>颜色</h4>
                        <div class="color-grid" id="change-colors"></div>
                    </div>
                    <div class="appearance-section">
                        <h4>名字</h4>
                        <input type="text" id="change-name-input" maxlength="8" placeholder="输入新名字">
                    </div>
                    <button class="save-appearance-btn" id="save-appearance">保存更改</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 浮动宠物容器 -->
    <div id="pet-container">
        <!-- 粒子画布 -->
        <canvas id="particle-canvas"></canvas>
        
        <!-- 宠物本体 -->
        <div id="floating-pet" class="pet-wrapper">
            <!-- 拖拽手柄 -->
            <div class="pet-drag-handle" id="pet-drag-handle">
                <span id="pet-drag-name"></span>
                <span class="drag-icon">⋮⋮</span>
            </div>
            
            <!-- 头顶图标 -->
            <div class="head-icon" id="head-icon">✨</div>
            
            <!-- 宠物SVG -->
            <div class="pet-body" id="pet-body">
                <svg viewBox="0 0 100 120" class="pet-svg-main" id="pet-svg">
                    <!-- 由JS动态生成 -->
                </svg>
            </div>
            
            <!-- 气泡 -->
            <div class="pet-bubble" id="pet-bubble">
                <span id="bubble-text"></span>
            </div>
        </div>
    </div>

    <script src="js/main.js"></script>
</body>
</html>
